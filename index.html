<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер розыгрышей</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f0efed;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b96;
    --accent: #5b3de8;
    --accent-bg: #eeebff;
    --accent-text: #3d27b0;
    --green: #2d7a3a;
    --green-bg: #e6f4e8;
    --amber: #8a5c00;
    --amber-bg: #fff3d4;
    --red: #b02020;
    --red-bg: #fdeaea;
    --blue: #1a5fa8;
    --blue-bg: #e6f0fb;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 0 0 0.5px rgba(0,0,0,0.06);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131312;
      --surface: #1e1e1c;
      --surface2: #272724;
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.16);
      --text: #f0efea;
      --text2: #a0a09a;
      --text3: #6a6a65;
      --accent: #8b6cf5;
      --accent-bg: #2a2050;
      --accent-text: #c4b0ff;
      --green: #5ab86a;
      --green-bg: #1a3320;
      --amber: #f0b840;
      --amber-bg: #2e2208;
      --red: #f07070;
      --red-bg: #2e1010;
      --blue: #6aadff;
      --blue-bg: #0e2040;
      --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.05);
    }
  }

  html { font-size: 16px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }

  .app { max-width: 680px; margin: 0 auto; padding: 0 16px 80px; }

  /* Header */
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 16px; border-bottom: 0.5px solid var(--border); margin-bottom: 20px; }
  .top-bar h1 { font-size: 20px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .top-bar h1 i { color: var(--accent); font-size: 22px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface); border-radius: var(--radius-sm); padding: 14px 16px; box-shadow: var(--shadow); }
  .stat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 600; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }

  /* Filters */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .f-btn { font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .f-btn:hover { background: var(--surface2); color: var(--text); }
  .f-btn.active { background: var(--accent-bg); color: var(--accent-text); border-color: transparent; }

  /* Cards */
  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; transition: box-shadow 0.15s; position: relative; overflow: hidden; }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 0 0 0.5px rgba(0,0,0,0.08); }
  .card.participated { opacity: 0.55; }
  .card.participated::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--green); border-radius: 3px 0 0 3px; }
  .card-urgent::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--red); border-radius: 3px 0 0 3px; }

  .card-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .card-main { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-prize { font-size: 13px; color: var(--text2); margin-bottom: 10px; display: flex; align-items: flex-start; gap: 5px; }
  .card-prize i { flex-shrink: 0; margin-top: 1px; }

  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; display: inline-flex; align-items: center; gap: 3px; }
  .badge-deadline { background: var(--amber-bg); color: var(--amber); }
  .badge-urgent { background: var(--red-bg); color: var(--red); }
  .badge-done { background: var(--green-bg); color: var(--green); }
  .badge-expired { background: var(--surface2); color: var(--text3); }
  .badge-cat { background: var(--accent-bg); color: var(--accent-text); }

  .card-conditions { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); font-size: 12px; color: var(--text3); display: flex; gap: 6px; align-items: flex-start; }
  .card-conditions i { flex-shrink: 0; font-size: 13px; margin-top: 1px; }

  .check-btn { width: 32px; height: 32px; flex-shrink: 0; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 17px; transition: all 0.15s; margin-top: 2px; }
  .check-btn:hover { border-color: var(--green); color: var(--green); }
  .check-btn.checked { background: var(--green-bg); border-color: var(--green); color: var(--green); }

  .empty { text-align: center; padding: 48px 16px; color: var(--text3); font-size: 15px; }
  .empty i { font-size: 40px; display: block; margin-bottom: 12px; }

  /* Add section */
  .add-section { margin-top: 28px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  .add-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 7px; }
  .add-section h2 i { color: var(--accent); }
  .add-hint { font-size: 13px; color: var(--text3); margin-bottom: 12px; margin-top: 3px; }
  .add-section textarea { width: 100%; font-size: 13px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 12px; resize: vertical; min-height: 100px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; line-height: 1.6; }
  .add-section textarea:focus { border-color: var(--accent); }
  .add-section textarea::placeholder { color: var(--text3); }

  .add-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .ai-btn { font-size: 13px; font-weight: 500; padding: 9px 18px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .ai-btn:hover { opacity: 0.88; }
  .ai-btn:disabled { opacity: 0.5; cursor: default; }
  .manual-btn { font-size: 13px; font-weight: 500; padding: 9px 16px; border-radius: 8px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: background 0.15s; }
  .manual-btn:hover { background: var(--surface2); }
  .loading-txt { font-size: 13px; color: var(--text3); display: none; align-items: center; gap: 5px; }
  .loading-txt.show { display: flex; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.9s linear infinite; display: inline-block; }

  /* Manual form */
  .manual-form { display: none; margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--border); }
  .manual-form.show { display: block; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 12px; color: var(--text2); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea { font-size: 13px; font-family: inherit; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface); }
  .save-btn { margin-top: 12px; font-size: 13px; font-weight: 500; padding: 9px 18px; border-radius: 8px; border: none; background: var(--green-bg); color: var(--green); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .save-btn:hover { opacity: 0.8; }

  /* Error toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: var(--bg); font-size: 13px; padding: 10px 18px; border-radius: 8px; transition: transform 0.25s; z-index: 99; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .stat { padding: 10px 12px; }
    .stat-value { font-size: 22px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <h1><i class="ti ti-gift" aria-hidden="true"></i> Розыгрыши</h1>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <button class="f-btn active" data-filter="all">Все</button>
    <button class="f-btn" data-filter="active">Активные</button>
    <button class="f-btn" data-filter="urgent">Скоро итоги</button>
    <button class="f-btn" data-filter="done">Участвую</button>
    <button class="f-btn" data-filter="expired">Завершены</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="add-section">
    <h2><i class="ti ti-sparkles" aria-hidden="true"></i> Добавить розыгрыш</h2>
    <p class="add-hint">Вставь текст поста — ИИ сам разберёт условия и дату</p>
    <textarea id="new-text" placeholder="Вставь текст розыгрыша из Telegram..."></textarea>
    <div class="add-row">
      <button class="ai-btn" id="ai-btn" onclick="parseAndAdd()">
        <i class="ti ti-wand" aria-hidden="true"></i> Разобрать с ИИ
      </button>
      <button class="manual-btn" onclick="toggleManual()">Добавить вручную</button>
      <span class="loading-txt" id="loading-txt">
        <i class="ti ti-loader spin" aria-hidden="true"></i> ИИ разбирает...
      </span>
    </div>
    <div class="manual-form" id="manual-form">
      <div class="form-grid">
        <div class="form-group full">
          <label>Название розыгрыша</label>
          <input type="text" id="m-title" placeholder="Например: iPhone 17 от iSpark">
        </div>
        <div class="form-group full">
          <label>Приз</label>
          <input type="text" id="m-prize" placeholder="Что разыгрывается">
        </div>
        <div class="form-group">
          <label>Дата итогов</label>
          <input type="date" id="m-date">
        </div>
        <div class="form-group">
          <label>Категория</label>
          <select id="m-cat">
            <option>Гаджеты</option>
            <option>Авто</option>
            <option>Мебель</option>
            <option>Разное</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Условия участия</label>
          <input type="text" id="m-cond" placeholder="Подписка на канал + нажать кнопку">
        </div>
      </div>
      <button class="save-btn" onclick="saveManual()">
        <i class="ti ti-check" aria-hidden="true"></i> Сохранить
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

const DATA_VERSION = 3;

const INITIAL = [
  {id:1,title:'Кресло LiberNovo от ERGONOMIKA',prize:'Кресло LiberNovo Omni OC1',deadline:'2026-07-04',conditions:'Подписка на @Romancev768 + нажать «Участвовать»',cat:'Мебель',done:false},
  {id:2,title:'Розыгрыш от Ингосстрах',prize:'iPhone 17 Pro, iPhone Air, Whoop, Яндекс Станция и др.',deadline:'2026-07-17',conditions:'Подписка на Telegram-канал + написать комментарий',cat:'Разное',done:false},
  {id:3,title:'OnePlus 15 + кроссовки Li-Ning',prize:'OnePlus 15 и кроссовки Li-Ning',deadline:'2026-07-16',conditions:'Подписка на @evgenmt, @skidkimt, @modnox + нажать «Участвовать»',cat:'Гаджеты',done:false},
  {id:4,title:'Apple-техника от iSpark Store',prize:'iPhone 17 Pro Max, AirPods Max 2, Apple Watch 11',deadline:'2026-07-11',conditions:'Подписка на канал iSpark + нажать «Участвовать»',cat:'Гаджеты',done:false},
  {id:5,title:'iPhone 17 Pro от WISHMASTER',prize:'iPhone 17 Pro 512GB оранжевый',deadline:'2026-07-13',conditions:'Подписка на @wishmasterrussiaa + нажать «Участвую»',cat:'Гаджеты',done:false},
  {id:6,title:'Infinix GT 50 Pro от WELOVEGAMES',prize:'Смартфон Infinix GT 50 Pro',deadline:'2026-07-09',conditions:'Подписка на WELOVEMEMES, WELOVEGAMES, Infinix Россия',cat:'Гаджеты',done:false},
  {id:7,title:'10 000 баллов Ozon × 5',prize:'10 000 баллов Ozon для 5 победителей',deadline:'2026-07-09',conditions:'Подписка на канал + пригласить друзей',cat:'Разное',done:false},
  {id:8,title:'Google Fitbit Air от ADS',prize:'Google Fitbit Air',deadline:'2026-06-30',conditions:'Подписка на ADS и ADS Б/У Техника + нажать «Участвовать»',cat:'Гаджеты',done:false},
  {id:9,title:'Купоны на Mazda 6',prize:'10 купонов на розыгрыш Mazda 6',deadline:'2026-06-28',conditions:'Подписка на канал + включить уведомления + кнопка «Участвовать»',cat:'Авто',done:false},
  {id:10,title:'PlayStation 5 Slim × 2 от NN',prize:'2 кастомных PlayStation 5 Slim (лайм и манго)',deadline:'2026-07-06',conditions:'Подписка на NN и ОТП Банк + нажать «Участвовать»',cat:'Гаджеты',done:false},
  {id:11,title:'AP×Swatch + MacBook Neo от MDK',prize:'Audemars Piguet × Swatch Royal Pop + Apple MacBook Neo',deadline:'2026-07-25',conditions:'Подписка на MDK и MDK PREMIUM + нажать «Участвую»',cat:'Гаджеты',done:false},
  {id:12,title:'Игровой ПК от CONSTRUCT PC',prize:'Сборка i5-12400F + RTX 5060',deadline:'2026-06-27',conditions:'Подписка на Construct PC и КБ.Игры + нажать «Участвовать»',cat:'Гаджеты',done:false},
  {id:13,title:'Кресло VECTIS ONE от Zone 51',prize:'Кресло VECTIS ONE Black-Beige',deadline:'2026-06-28',conditions:'Подписка на канал Zone 51 + нажать «Участвую»',cat:'Мебель',done:false},
  {id:14,title:'Samsung Galaxy S26 Ultra × 2 от WB',prize:'2 × Samsung Galaxy S26 Ultra фиолетовый',deadline:'2026-07-02',conditions:'Подписка на WILDBERRIES + нажать «Участвовать»',cat:'Гаджеты',done:false},
  {id:15,title:'3 ящика кваса от Пятёрочки',prize:'3 ящика кваса',deadline:'2026-06-30',conditions:'Подписка на «Пятёрочку» + нажать кнопку под постом',cat:'Разное',done:false},
  {id:16,title:'Mazda CX-5 — стикеры на конкурс',prize:'10 стикеров-купонов на розыгрыш Mazda CX-5',deadline:'2026-06-24',conditions:'Подписка на канал «Тачка за сутки» + нажать «Участвую»',cat:'Авто',done:false},
];

const STORAGE_KEY = 'gw_v' + DATA_VERSION;
let data = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || INITIAL; } catch(e){ return INITIAL; } })();
let nextId = Math.max(...data.map(g=>g.id), 0) + 1;
let filter = 'all';

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){} }

function daysLeft(d) {
  const dl = new Date(d); dl.setHours(0,0,0,0);
  return Math.ceil((dl - TODAY) / 86400000);
}

function fmtDate(d) {
  return new Date(d).toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
}

function renderStats() {
  const total = data.length;
  const active = data.filter(g => daysLeft(g.deadline) >= 0).length;
  const part = data.filter(g => g.done).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Всего</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Активных</div><div class="stat-value accent">${active}</div></div>
    <div class="stat"><div class="stat-label">Участвую</div><div class="stat-value green">${part}</div></div>
  `;
}

function renderCards() {
  let list = [...data];
  if(filter === 'active') list = list.filter(g => daysLeft(g.deadline) >= 0);
  else if(filter === 'urgent') list = list.filter(g => daysLeft(g.deadline) >= 0 && daysLeft(g.deadline) <= 5);
  else if(filter === 'done') list = list.filter(g => g.done);
  else if(filter === 'expired') list = list.filter(g => daysLeft(g.deadline) < 0);
  else list = list.filter(g => daysLeft(g.deadline) >= 0);

  list.sort((a,b) => {
    if(a.done !== b.done) return a.done ? 1 : -1;
    return new Date(a.deadline) - new Date(b.deadline);
  });

  if(!list.length) {
    document.getElementById('cards').innerHTML = `<div class="empty"><i class="ti ti-mood-empty" aria-hidden="true"></i>Нет розыгрышей в этой категории</div>`;
    return;
  }

  document.getElementById('cards').innerHTML = list.map(g => {
    const days = daysLeft(g.deadline);
    let badge = '';
    let urgentClass = '';
    if(g.done) badge = `<span class="badge badge-done"><i class="ti ti-check" style="font-size:10px" aria-hidden="true"></i> Участвую</span>`;
    else if(days < 0) badge = `<span class="badge badge-expired">Завершён</span>`;
    else if(days === 0) { badge = `<span class="badge badge-urgent"><i class="ti ti-flame" style="font-size:10px" aria-hidden="true"></i> Сегодня итоги!</span>`; urgentClass = 'card-urgent'; }
    else if(days <= 3) { badge = `<span class="badge badge-urgent"><i class="ti ti-flame" style="font-size:10px" aria-hidden="true"></i> Через ${days} дн.</span>`; urgentClass = 'card-urgent'; }
    else badge = `<span class="badge badge-deadline"><i class="ti ti-calendar" style="font-size:10px" aria-hidden="true"></i> ${fmtDate(g.deadline)}</span>`;

    return `<div class="card ${g.done ? 'participated' : urgentClass}">
      <div class="card-row">
        <div class="card-main">
          <div class="card-title">${g.title}</div>
          <div class="card-prize"><i class="ti ti-trophy" style="font-size:13px; color:var(--amber)" aria-hidden="true"></i> ${g.prize}</div>
          <div class="badges">
            ${badge}
            <span class="badge badge-cat">${g.cat}</span>
          </div>
          <div class="card-conditions"><i class="ti ti-list-check" aria-hidden="true"></i><span>${g.conditions}</span></div>
        </div>
        <button class="check-btn ${g.done?'checked':''}" onclick="toggle(${g.id})" title="${g.done?'Убрать отметку':'Отметить участие'}">
          <i class="ti ti-check" aria-hidden="true"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

function render() { renderStats(); renderCards(); }

function toggle(id) {
  const g = data.find(x=>x.id===id);
  if(g) { g.done = !g.done; save(); render(); }
}

document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    render();
  });
});

function toggleManual() {
  const f = document.getElementById('manual-form');
  f.classList.toggle('show');
}

function saveManual() {
  const title = document.getElementById('m-title').value.trim();
  const prize = document.getElementById('m-prize').value.trim();
  const deadline = document.getElementById('m-date').value;
  const cat = document.getElementById('m-cat').value;
  const conditions = document.getElementById('m-cond').value.trim();
  if(!title || !deadline) { showToast('Укажи название и дату'); return; }
  data.push({id:nextId++, title, prize: prize||'—', deadline, conditions: conditions||'—', cat, done:false});
  save(); render();
  ['m-title','m-prize','m-date','m-cond'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('manual-form').classList.remove('show');
  showToast('Добавлено!');
}

async function parseAndAdd() {
  const text = document.getElementById('new-text').value.trim();
  if(!text) { showToast('Вставь текст розыгрыша'); return; }
  const btn = document.getElementById('ai-btn');
  const loading = document.getElementById('loading-txt');
  btn.disabled = true;
  loading.classList.add('show');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{role:'user', content:`Разбери текст розыгрыша и верни ТОЛЬКО JSON без markdown и пояснений:
{"title":"краткое название до 60 символов","prize":"что конкретно разыгрывается","deadline":"дата итогов YYYY-MM-DD, если не указана — 2026-07-31","conditions":"условия участия кратко до 100 символов","cat":"одна категория: Гаджеты или Авто или Мебель или Разное"}

Текст розыгрыша:
${text}`}]
      })
    });
    const d = await res.json();
    const raw = (d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    data.push({id:nextId++, done:false, ...parsed});
    save(); render();
    document.getElementById('new-text').value = '';
    showToast('Розыгрыш добавлен!');
  } catch(e) {
    showToast('Не удалось разобрать — попробуй вручную');
  }
  btn.disabled = false;
  loading.classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
